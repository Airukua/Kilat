# Kilat experiment config: small dense baseline (minimal for quick testing)
experiment:
  name: test-run
  description: Minimal test to verify checkpoint saving
  tags: ["test", "quick"]

model:
  vocab_size: 50257
  n_embd: 128          # diperkecil dari 768
  n_layer: 2           # diperkecil dari 12
  n_head: 4            # diperkecil dari 12 (128/4=32)
  recall_ratio: 0.5
  latent_dim: 32
  attn_drop: 0.0
  ffn_mode: dense
  ff_mult: 2.6666666667
  ffn_dropout: 0.0
  num_experts: 8
  active_experts: 2
  num_shared_experts: 0
  fine_grained_factor: 1
  aux_loss_coef: 0.01
  device_balance_coef: 0.001
  embd_drop: 0.0
  resid_drop: 0.0
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tie_word_embeddings: true
  use_cache: false
  initializer_range: 0.02

tokenizer:
  tokenizer_type: auto
  tokenizer_name_or_path: gpt2
  use_fast: true
  local_files_only: true

dataloader:
  train_batch_size: 2
  eval_batch_size: 2
  num_workers: 0        # 0 untuk debugging lebih mudah
  pin_memory: false
  prefetch_factor: 2
  persistent_workers: false
  drop_last: true
  max_seq_length: 128   # diperkecil dari 1024
  truncation: right
  use_packing: false
  packed_block_size: null
  use_distributed_sampler: true
  distributed_shuffle: true
  train_data_path: data/fine-web/train/tokens.npy
  eval_data_path: data/fine-web/val/tokens.npy
  dataset_format: parquet
  cache_dir: null
  prefetch_batches: 2

training:
  output_dir: ./checkpoints
  resume_from_checkpoint: null
  save_checkpoints: true
  atomic_checkpoint: true
  training_mode: steps
  learning_rate: 1.5e-3
  beta1: 0.9
  beta2: 0.95
  epsilon: 1.0e-8
  gradient_accumulation_steps: 1    # dikurangi dari 2
  weight_decay: 0.1
  max_grad_norm: 1.0
  max_steps: 100                    # kecil: hanya 100 step
  num_train_epochs: 1
  warmup_steps: 10
  scheduler_type: cosine
  scheduler_kwargs: {}
  logging_steps: 10
  eval_steps: 50
  save_steps: 50                    # checkpoint setiap 50 step
  save_total_limit: 2
  early_stopping_patience: 3
  early_stopping_threshold: 0.0
  metric_for_best_model: eval_loss
  greater_is_better: null
  precision: bf16
  report_to: "none"
  run_name: test-run
  seed: 42