# Kilat experiment config: small MoE for RTX 4050 (6GB VRAM)
experiment:
  name: moe-rtx4050-optimized
  description: MoE model optimized for RTX 4050 6GB VRAM
  tags: ["moe", "rtx4050", "optimized"]

model:
  vocab_size: 50257
  n_embd: 768  
  n_layer: 10        
  n_head: 12         
  recall_ratio: 0.5
  latent_dim: 128      
  attn_drop: 0.0

  use_rope: true                    
  rope_head_dim: 32                 
  rope_base: 10000.0                
  
  # MoE configuration 
  ffn_mode: moe
  ff_mult: 2.6666666667
  ffn_dropout: 0.0
  num_experts: 4      
  active_experts: 2    
  num_shared_experts: 0
  fine_grained_factor: 1
  aux_loss_coef: 0.01
  device_balance_coef: 0.001
  
  # Regularisation
  embd_drop: 0.0
  resid_drop: 0.0
  
  # HF boilerplate
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tie_word_embeddings: true
  use_cache: false
  initializer_range: 0.02

tokenizer:
  tokenizer_type: auto
  tokenizer_name_or_path: gpt2  
  use_fast: true
  local_files_only: true

dataloader:
  train_batch_size: 4  
  eval_batch_size: 4
  num_workers: 2       
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: false
  drop_last: true
  max_seq_length: 512   
  truncation: right
  use_packing: false
  packed_block_size: null
  use_distributed_sampler: true
  distributed_shuffle: true
  train_data_path: data/fine-web/train/tokens.npy
  eval_data_path: data/fine-web/val/tokens.npy
  dataset_format: memmap
  cache_dir: null
  prefetch_batches: 2

training:
  output_dir: ./checkpoints
  resume_from_checkpoint: null
  save_checkpoints: true
  atomic_checkpoint: true
  training_mode: steps
  learning_rate: 3.0e-4    
  beta1: 0.9
  beta2: 0.95
  epsilon: 1.0e-8
  gradient_accumulation_steps: 4   
  weight_decay: 0.1
  max_grad_norm: 1.0
  max_steps: 50000
  num_train_epochs: 1
  warmup_steps: 1000
  scheduler_type: cosine_with_min_lr
  scheduler_kwargs: 
    min_lr_ratio: 0.1
  logging_steps: 100
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  early_stopping_patience: 3
  early_stopping_threshold: 0.0
  metric_for_best_model: eval_loss
  greater_is_better: null
  precision: fp16          
  report_to: "none"
  run_name: moe-rtx4050
  seed: 42