# Kilat experiment config: small dense baseline
experiment:
  name: small-dense-baseline
  description: Small dense baseline for quick smoke tests and local experiments.
  tags: ["dense", "baseline", "smoke-test"]

model:
  vocab_size: 50000
  n_embd: 640
  n_layer: 8
  n_head: 10
  recall_ratio: 0.5
  latent_dim: 140
  attn_drop: 0.0
  ffn_mode: dense
  ff_mult: 2.6666666667
  ffn_dropout: 0.0
  num_experts: 8
  active_experts: 2
  num_shared_experts: 0
  fine_grained_factor: 1
  aux_loss_coef: 0.01
  device_balance_coef: 0.001
  embd_drop: 0.0
  resid_drop: 0.0
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tie_word_embeddings: true
  use_cache: false
  initializer_range: 0.02

tokenizer:
  tokenizer_type: sentencepiece 
  tokenizer_name_or_path: data/indo/tokenizer/
  tokenizer_model_path: data/indo/tokenizer/sp_tokenizer.model
  use_fast: true
  local_files_only: true

dataloader:
  train_batch_size: 8
  eval_batch_size: 8
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: false
  drop_last: true
  max_seq_length: 1024
  truncation: right
  use_packing: false
  packed_block_size: null
  use_distributed_sampler: true
  distributed_shuffle: true
  train_data_path: null
  eval_data_path: null
  dataset_format: parquet
  cache_dir: null
  prefetch_batches: 2

training:
  output_dir: ./checkpoints
  resume_from_checkpoint: null
  save_checkpoints: true
  atomic_checkpoint: true
  training_mode: steps
  learning_rate: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  epsilon: 1.0e-8
  gradient_accumulation_steps: 2
  weight_decay: 0.1
  max_grad_norm: 1.0
  max_steps: 50000
  num_train_epochs: 1
  warmup_steps: 1000
  scheduler_type: cosine
  scheduler_kwargs: {}
  logging_steps: 100
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  early_stopping_patience: 3
  early_stopping_threshold: 0.0
  metric_for_best_model: eval_loss
  greater_is_better: null
  precision: bf16
  report_to: "none"
  run_name: small-dense-baseline
  seed: 42