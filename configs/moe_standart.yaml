# Kilat experiment config: standard MoE baseline
experiment:
  name: standard-moe
  description: Standard MoE configuration with routed experts and no shared experts.
  tags: ["moe", "baseline"]

model:
  vocab_size: 50257
  n_embd: 2048
  n_layer: 32
  n_head: 32
  recall_ratio: 0.5
  latent_dim: 512
  attn_drop: 0.0
  ffn_mode: moe
  ff_mult: 2.6666666667
  ffn_dropout: 0.0
  num_experts: 64
  active_experts: 8
  num_shared_experts: 0
  fine_grained_factor: 1
  aux_loss_coef: 0.01
  device_balance_coef: 0.001
  embd_drop: 0.0
  resid_drop: 0.0
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tie_word_embeddings: true
  use_cache: false
  initializer_range: 0.02

tokenizer:
  tokenizer_type: auto
  tokenizer_name_or_path: gpt2
  tokenizer_model_path: null
  use_fast: true
  local_files_only: true

training:
  output_dir: ./checkpoints/moe-standard
  resume_from_checkpoint: null
  save_checkpoints: true
  atomic_checkpoint: true
  training_mode: steps
  learning_rate: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  epsilon: 1.0e-8
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_steps: 100000
  num_train_epochs: 1
  warmup_steps: 1000
  scheduler_type: cosine
  scheduler_kwargs: {}
  logging_steps: 100
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 5
  early_stopping_patience: 5
  early_stopping_threshold: 0.0
  metric_for_best_model: eval_loss
  greater_is_better: null
  precision: bf16
  report_to: "none"
  run_name: standard-moe
  seed: 42
