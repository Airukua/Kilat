# Kilat experiment config: small dense baseline
experiment:
  name: small-dense-baseline
  description: Small dense baseline for quick smoke tests and local experiments.
  tags: ["dense", "baseline", "smoke-test"]

model:
  vocab_size: 50257
  n_embd: 768
  n_layer: 12
  n_head: 12
  recall_ratio: 0.5
  latent_dim: 192
  attn_drop: 0.0
  ffn_mode: dense
  ff_mult: 2.6666666667
  ffn_dropout: 0.0
  num_experts: 8
  active_experts: 2
  num_shared_experts: 0
  fine_grained_factor: 1
  aux_loss_coef: 0.01
  device_balance_coef: 0.001
  embd_drop: 0.0
  resid_drop: 0.0
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tie_word_embeddings: true
  use_cache: false
  initializer_range: 0.02

tokenizer:
  tokenizer_type: auto
  tokenizer_name_or_path: gpt2
  tokenizer_model_path: null
  use_fast: true
  local_files_only: true

training:
  output_dir: ./checkpoints/small-dense
  resume_from_checkpoint: null
  save_checkpoints: true
  atomic_checkpoint: true
  training_mode: epochs
  learning_rate: 5.0e-5
  beta1: 0.9
  beta2: 0.95
  epsilon: 1.0e-8
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_steps: -1
  num_train_epochs: 3
  warmup_steps: 0
  scheduler_type: cosine
  scheduler_kwargs: {}
  logging_steps: 100
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  early_stopping_patience: 3
  early_stopping_threshold: 0.0
  metric_for_best_model: eval_loss
  greater_is_better: null
  precision: bf16
  report_to: "none"
  run_name: small-dense-baseline
  seed: 42
